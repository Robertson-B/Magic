<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <meta name="theme-color" content="#8c3f2c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/silkroad.css') }}">
</head>
<body>
    <div id="offline-banner" class="offline-banner" hidden>
        You are offline. Changes may not sync until your connection returns.
    </div>

    <nav class="sr-navbar">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="sr-brand" href="/">{{ site_name }}</a>
            <div class="sr-nav">
                <a class="sr-link" href="/">Home</a>
                <a class="sr-link" href="/tournaments/history">History</a>
                <a class="sr-link" href="/about">Guide</a>
            </div>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="sr-footer mt-5">
        <div class="container text-center py-4">
            <small>© {{ site_name }} — Built for Magic: The Gathering club brackets.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const banner = document.getElementById('offline-banner');
            function syncOnlineStatus() {
                if (!banner) {
                    return;
                }
                banner.hidden = navigator.onLine;
            }

            window.addEventListener('online', syncOnlineStatus);
            window.addEventListener('offline', syncOnlineStatus);
            syncOnlineStatus();
        })();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('{{ url_for('service_worker') }}');
            });
        }
    </script>
</body>
</html>
